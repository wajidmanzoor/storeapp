<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Store Ops</title>
<style>
  :root{
    --primary:#4F6BED; --primary-dark:#3F57D6; --primary-light:#C7D2FA; --primary-tint:#EEF1FE;
    --ink:#16181C; --paper:#F7F8FA; --card:#FFFFFF;
    --slate:#8A8F98; --line:#F1F2F4;
    --green:#12A150; --green-bg:#EAFBF1;
    --amber:#E08C12; --amber-bg:#FFF6E9;
    --red:#F1543F; --red-bg:#FEF3F2;
    --shadow:0 4px 18px rgba(20,24,40,.055);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:"Hanken Grotesk",Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#E9ECF5; color:var(--ink); -webkit-tap-highlight-color:transparent;
  }
  #app{width:100%;max-width:390px; margin:0 auto; min-height:100vh; background:var(--paper); display:flex; flex-direction:column; box-shadow:0 0 40px rgba(20,24,40,.10);}
  .header{background:var(--card); color:var(--ink); padding:16px 18px 14px; position:relative; border-bottom:1px solid var(--line);}
  .header-row{display:flex; justify-content:space-between; align-items:center; position:relative; z-index:1;}
  .brand-lockup{display:flex; align-items:center; gap:10px; min-width:0;}
  .brand-mark{width:38px;height:38px;border-radius:13px;background:var(--primary);display:grid;place-items:center;color:#fff;box-shadow:0 6px 14px rgba(79,107,237,.22);flex:0 0 auto;}
  .brand-mark svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .brand{font-weight:800; letter-spacing:-.35px; font-size:17px; color:var(--ink); line-height:1.1;}
  .brand-sub{font-size:11px; color:var(--slate); margin-top:3px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:180px;}
  .account-area{display:flex;align-items:center;gap:9px;}
  .bell-btn{width:36px;height:36px;border:0;border-radius:50%;background:#F2F3F6;color:#5B616B;display:grid;place-items:center;position:relative;}
  .bell-btn::after{content:"";position:absolute;right:7px;top:7px;width:7px;height:7px;border-radius:50%;background:var(--red);border:2px solid #fff;}
  .bell-btn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;}
  .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(145deg,#C7D2FA,#EEF1FE);color:var(--primary-dark);display:grid;place-items:center;font-weight:800;font-size:13px;border:2px solid #fff;box-shadow:0 2px 8px rgba(20,24,40,.1);}
  .role-chip{position:absolute;right:16px;top:64px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:7px 10px;font-size:11px;color:#5B616B;box-shadow:var(--shadow);z-index:5;display:none;}
  .header:hover .role-chip,.role-chip:focus-within{display:flex;gap:6px;}
  .role-chip button{background:none;border:none;color:var(--primary);font-weight:700;font-size:11px;cursor:pointer;padding:0;}
  .content{flex:1; padding:20px 18px 104px; overflow-y:auto;}
  .card{background:var(--card); border:1px solid rgba(241,242,244,.9); border-radius:18px; padding:17px 18px; margin-bottom:16px; box-shadow:var(--shadow);}
  .filter-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 11px 2px;margin-bottom:12px;box-shadow:0 2px 10px rgba(20,24,40,.035);}
  .filter-card .flex-gap{gap:7px;}
  .filter-card .field{margin-bottom:8px;min-width:0;}
  .filter-card label{font-size:10px;margin:0 0 3px 2px;}
  .filter-card select{height:36px;padding:6px 27px 6px 9px;margin:0;border-radius:9px;font-size:11px;background-color:#F7F8FA;white-space:nowrap;text-overflow:ellipsis;}
  .section-title{font-size:12px; letter-spacing:.15px; color:#5B616B; font-weight:700; margin:8px 2px 10px;}
  .page-head{margin:2px 2px 20px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;}
  .page-title{font-size:27px;line-height:1.05;letter-spacing:-.8px;font-weight:800;margin:0 0 5px;}
  .page-subtitle{font-size:13px;color:var(--slate);margin:0;}
  .eyebrow{font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--primary);margin-bottom:6px;}
  .greeting{margin:3px 2px 20px;}
  .greeting h1{font-size:28px;line-height:1.08;letter-spacing:-.9px;margin:0 0 5px;font-weight:800;}
  .greeting p{margin:0;color:var(--slate);font-size:13px;}
  .quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px;}
  .quick-tile{border:0;border-radius:17px;padding:14px 8px 12px;text-align:center;background:#fff;box-shadow:var(--shadow);color:var(--ink);font-family:inherit;cursor:pointer;min-width:0;}
  .quick-icon{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;margin:0 auto 9px;}
  .quick-icon svg{width:21px;height:21px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .quick-label{display:block;font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ops-strip{display:flex;flex-direction:column;gap:11px;margin:0 0 22px;}
  .ops-card{width:100%;border:0;border-radius:20px;padding:18px;background:#fff;box-shadow:var(--shadow);font-family:inherit;text-align:left;cursor:pointer;color:var(--ink);display:flex;align-items:center;gap:14px;}
  .ops-card .quick-icon{margin:0;flex:0 0 auto;}
  .ops-copy{min-width:0;flex:1;}
  .ops-title{display:block;font-size:16px;font-weight:800;letter-spacing:-.2px;margin-bottom:3px;}
  .ops-note{display:block;font-size:12px;color:var(--slate);}
  .pending-count{min-width:58px;height:42px;padding:5px 9px;border-radius:13px;background:#FFF6E9;color:#C97708;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:15px;font-weight:800;line-height:1;}
  .pending-count small{font-size:8px;text-transform:uppercase;letter-spacing:.45px;margin-bottom:3px;}
  .see-all{border:0;background:none;color:var(--primary);font:700 11px inherit;cursor:pointer;padding:5px 0;}
  .tint-blue{background:#EEF1FE;color:#4F6BED}.tint-green{background:#EAFBF1;color:#12A150}.tint-amber{background:#FFF6E9;color:#E08C12}.tint-red{background:#FEF3F2;color:#F1543F}.tint-purple{background:#F1EEFE;color:#7C5CE0}.tint-cyan{background:#EAF6FF;color:#1B84D6}
  .feature-card{padding:0;overflow:hidden;}
  .feature-card .card-head{padding:17px 18px 12px;display:flex;align-items:center;justify-content:space-between;}
  .card-head-title{font-size:15px;font-weight:800;letter-spacing:-.15px;}
  .card-head-note{font-size:11px;color:var(--primary);font-weight:700;}
  .feature-card .list-wrap{padding:0 18px 5px;}
  .fab{position:fixed;bottom:94px;right:max(calc((100vw - 390px)/2 + 18px),18px);width:54px;height:54px;border:0;border-radius:18px;background:var(--primary);color:#fff;display:grid;place-items:center;box-shadow:0 10px 26px rgba(79,107,237,.34);font-size:28px;cursor:pointer;z-index:110;}
  .fab.extended{width:auto;height:50px;padding:0 18px;border-radius:16px;display:flex;gap:8px;font-size:13px;font-weight:800;font-family:inherit;}
  .fab.extended .plus{font-size:22px;line-height:1;font-weight:500;}
  .sheet-overlay{position:fixed;inset:0;background:rgba(22,24,28,.46);backdrop-filter:blur(3px);z-index:220;display:flex;align-items:flex-end;justify-content:center;}
  .bottom-sheet{background:#fff;width:100%;max-width:390px;border-radius:26px 26px 0 0;padding:10px 18px 22px;max-height:82vh;overflow:auto;overscroll-behavior:contain;box-shadow:0 -14px 50px rgba(20,24,40,.16);animation:sheetUp .22s ease-out;}
  @keyframes sheetUp{from{transform:translateY(35px);opacity:.5}to{transform:translateY(0);opacity:1}}
  .sheet-handle{width:42px;height:5px;border-radius:5px;background:#DEE1E6;margin:0 auto 18px;}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .sheet-title{font-size:21px;font-weight:800;letter-spacing:-.4px;}
  .close-sheet{width:34px;height:34px;border:0;border-radius:50%;background:#F2F3F6;color:#5B616B;font-size:20px;cursor:pointer;}
  .segment{display:grid;grid-template-columns:1fr 1fr;gap:4px;background:#F2F3F6;border-radius:12px;padding:4px;margin-bottom:14px;}
  .segment label{margin:0;cursor:pointer;}
  .segment input{position:absolute;opacity:0;pointer-events:none;}
  .segment span{display:block;text-align:center;padding:9px;border-radius:9px;font-size:12px;font-weight:700;color:var(--slate);}
  .segment input:checked+span{background:#fff;color:var(--primary);box-shadow:0 2px 8px rgba(20,24,40,.08);}
  .audience-chip{display:inline-flex;align-items:center;gap:5px;background:var(--primary-tint);color:var(--primary-dark);border-radius:20px;padding:4px 8px;font-size:10px;font-weight:700;margin-top:7px;}
  .audience-chip svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;}
  .week-card{background:#fff;border-radius:18px;padding:14px;box-shadow:var(--shadow);margin-bottom:18px;}
  .week-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .week-label{font-size:13px;font-weight:800;}
  .week-reset{border:0;background:var(--primary-tint);color:var(--primary);border-radius:9px;padding:6px 9px;font:700 10px inherit;cursor:pointer;}
  .week-days{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:5px;}
  .week-day{min-width:0;border:0;background:#fff;border-radius:12px;padding:11px 1px;color:var(--slate);font-family:inherit;cursor:pointer;text-align:center;box-shadow:0 4px 12px rgba(20,24,40,.035);}
  .week-day span{display:block;font-size:10px;font-weight:800;margin:0;white-space:nowrap;}
  .week-day strong{display:grid;place-items:center;width:28px;height:28px;margin:auto;border-radius:10px;font-size:12px;}
  .week-day.today strong{background:var(--primary-tint);color:var(--primary);}
  .week-day.selected{background:var(--primary);color:#fff;}
  .week-day.selected strong{background:rgba(255,255,255,.18);color:#fff;}
  .schedule-context{font-size:14px;color:var(--slate);margin:-10px 2px 18px;}
  .schedule-timeline{display:flex;flex-direction:column;gap:9px;margin-top:8px;}
  .timeline-row{display:grid;grid-template-columns:58px 1fr;gap:10px;align-items:start;}
  .timeline-time{padding-top:17px;color:#8A8F98;font-size:12px;font-weight:700;text-align:left;}
  .shift-card{position:relative;background:#fff;border-radius:0 17px 17px 0;padding:14px 15px 13px 17px;box-shadow:var(--shadow);border-left:4px solid var(--primary);min-height:68px;}
  .shift-card.is-past{border-left-color:#C4C9D0;}
  .shift-card.is-now{border-left-color:var(--green);}
  .shift-title{font-size:14px;font-weight:800;padding-right:46px;}
  .shift-sub{font-size:12px;color:var(--slate);margin-top:4px;}
  .now-pill{position:absolute;right:12px;top:13px;background:var(--green-bg);color:var(--green);border-radius:18px;padding:5px 8px;font-size:9px;font-weight:800;text-transform:uppercase;}
  .shift-actions{margin-top:8px;display:flex;justify-content:flex-end;}
  .clock-card{background:linear-gradient(145deg,#4F6BED,#4059D8);color:#fff;border-radius:22px;padding:22px;margin-bottom:15px;box-shadow:0 14px 30px rgba(79,107,237,.24);}
  .clock-status{font-size:11px;text-transform:uppercase;letter-spacing:.7px;opacity:.78;font-weight:800;}
  .clock-time{font-size:34px;font-weight:800;letter-spacing:-1px;margin:8px 0 3px;}
  .clock-store{font-size:12px;opacity:.82;}
  .clock-action{margin-top:18px;background:#fff;color:var(--primary);box-shadow:none;}
  .clock-action.clocked{background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.35);}
  .geo-note{display:flex;gap:8px;align-items:flex-start;font-size:11px;line-height:1.4;margin-top:12px;opacity:.8;}
  .pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px;}
  .pay-stat{background:#fff;border-radius:16px;padding:15px;box-shadow:var(--shadow);}
  .pay-stat span{display:block;font-size:10px;color:var(--slate);font-weight:700;margin-bottom:6px;}
  .pay-stat strong{font-size:20px;letter-spacing:-.4px;}
  .salary-summary{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px;}
  .salary-card{background:#fff;border-radius:17px;padding:15px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s;}
  .salary-card:active{transform:scale(.99);}
  .salary-meta{font-size:11px;color:var(--slate);line-height:1.5;margin-top:4px;}
  .salary-amount{font-size:18px;font-weight:800;letter-spacing:-.3px;}
  .status-filter{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;background:#F2F3F6;border-radius:11px;padding:4px;margin-bottom:12px;}
  .status-filter button{border:0;border-radius:8px;background:transparent;padding:7px 4px;color:var(--slate);font:700 10px inherit;cursor:pointer;}
  .status-filter button.active{background:#fff;color:var(--primary);box-shadow:0 2px 7px rgba(20,24,40,.08);}
  .employee-detail-head{display:flex;align-items:center;gap:12px;margin-bottom:17px;}
  .employee-detail-avatar{width:50px;height:50px;border-radius:17px;background:var(--primary-tint);color:var(--primary);display:grid;place-items:center;font-size:16px;font-weight:800;}
  .detail-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:16px;}
  .detail-stat{background:#F7F8FA;border-radius:12px;padding:10px 7px;text-align:center;}
  .detail-stat span{display:block;font-size:8px;color:var(--slate);text-transform:uppercase;font-weight:800;margin-bottom:4px;}
  .detail-stat strong{font-size:13px;}
  .list-item.team-row{position:relative;display:block;width:100%;cursor:pointer;padding-right:2px;user-select:none;}
  .kebab-btn{width:34px;height:34px;border:0;border-radius:11px;background:#F2F3F6;color:#5B616B;font-size:22px;line-height:1;cursor:pointer;display:grid;place-items:center;}
  .team-action-menu{position:static;width:100%;margin-top:11px;background:#F7F8FA;border:1px solid var(--line);border-radius:13px;padding:5px;box-shadow:none;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:3px;}
  .team-action-menu button{display:block;width:100%;min-width:0;border:0;background:#fff;border-radius:9px;padding:9px 10px;text-align:left;color:var(--ink);font:700 11px inherit;cursor:pointer;}
  .team-action-menu button:hover{background:#F7F8FA;}
  .team-action-menu button.danger-option{color:var(--red);}
  h2{font-size:22px; line-height:1.15; letter-spacing:-.35px; font-weight:800; margin:0 0 7px; color:var(--ink);}
  .muted{color:var(--slate); font-size:13px; line-height:1.45;}
  .row{display:flex; justify-content:space-between; align-items:center;}
  .btn{
    background:var(--primary); color:#fff; border:none; border-radius:12px; padding:12px 16px;
    font-weight:700; font-size:14px; cursor:pointer; width:100%; box-shadow:0 4px 12px rgba(79,107,237,.18); transition:transform .15s, background .15s;
  }
  .btn:active{transform:scale(.985);}
  .btn.secondary{background:#F7F8FA; color:#3A3F47; border:1px solid #EAECF0; box-shadow:none;}
  .btn.small{width:auto; padding:7px 11px; font-size:11px; border-radius:9px;}
  .btn.danger{background:var(--red);}
  input, select, textarea{
    width:100%; padding:12px 13px; border:1px solid #DEE1E6; border-radius:12px;
    font-size:14px; background:#fff; color:var(--ink); font-family:inherit; margin-bottom:10px; transition:border-color .15s, box-shadow .15s;
  }
  input:focus, select:focus, textarea:focus{outline:none; border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-tint);}
  label{font-size:12px; color:var(--slate); font-weight:600; display:block; margin-bottom:4px;}
  .field{margin-bottom:12px;}
  .badge{font-size:10px; font-weight:800; padding:5px 9px; border-radius:20px; text-transform:uppercase; letter-spacing:0.35px;}
  .badge.pending{background:var(--amber-bg); color:var(--amber);}
  .badge.approved, .badge.paid{background:var(--green-bg); color:var(--green);}
  .badge.resolved{background:var(--green-bg); color:var(--green);}
  .list-item{display:flex; justify-content:space-between; align-items:center; padding:13px 0; border-bottom:1px solid var(--line);}
  .list-item:last-child{border-bottom:none;}
  .tabbar{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:390px;
    background:rgba(255,255,255,.97); border-top:1px solid var(--line); display:flex; padding:8px 6px 10px; backdrop-filter:blur(16px); z-index:100;
  }
  .tab{flex:1; text-align:center; background:none; border:none; border-radius:13px; padding:6px 2px; cursor:pointer; color:#A2A8B2;}
  .tab.active{color:var(--primary-dark);}
  .tab.active .tab-icon{background:var(--primary-tint);}
  .tab-icon{line-height:30px; width:38px; height:30px; border-radius:12px; display:grid;place-items:center; margin:0 auto 2px;}
  .tab-icon svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;}
  .tab-label{font-size:10px; font-weight:700;}
  .empty{text-align:center; padding:30px 10px; color:var(--slate); font-size:13px;}
  .qty-control{display:flex; align-items:center; gap:8px;}
  .qty-btn{width:30px; height:30px; border-radius:9px; border:0; background:var(--primary-tint); color:var(--primary-dark); font-size:16px; font-weight:700; cursor:pointer;}
  .login-wrap{display:flex; align-items:center; justify-content:center; min-height:100vh; padding:26px; background:linear-gradient(155deg,#E8EDFF 0%,var(--paper) 48%,#fff 100%); position:relative; overflow:hidden;}
  .login-wrap::before{content:""; position:absolute; width:250px; height:250px; border-radius:50%; background:var(--primary); opacity:.08; top:-110px; right:-100px;}
  .login-card{background:#fff; border-radius:24px; padding:30px 25px; width:100%; max-width:360px; border:1px solid rgba(255,255,255,.8); box-shadow:0 18px 50px rgba(45,57,112,.12); position:relative; z-index:1;}
  .auth-screen{display:block;min-height:100vh;padding:72px 24px 44px;background:#F3F5F9;position:relative;overflow-y:auto;}
  .auth-brand{text-align:center;margin-bottom:34px;}
  .auth-logo{width:78px;height:78px;border-radius:24px;background:linear-gradient(145deg,#6C83F3,#4F6BED);color:#fff;display:grid;place-items:center;margin:0 auto 20px;box-shadow:0 14px 32px rgba(79,107,237,.24);}
  .auth-logo svg{width:38px;height:38px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
  .auth-brand h1{font-size:30px;letter-spacing:-.9px;margin:0 0 6px;font-weight:800;}
  .auth-brand p{margin:0;color:#A2A8B2;font-size:13px;}
  .auth-form-card{background:#fff;border-radius:24px;padding:22px;box-shadow:0 14px 40px rgba(20,24,40,.07);margin-bottom:18px;}
  .auth-field{margin-bottom:17px;}
  .auth-field:last-child{margin-bottom:0;}
  .auth-field label{font-size:11px;text-transform:uppercase;letter-spacing:.45px;margin:0 0 8px 2px;color:#8A8F98;font-weight:800;}
  .auth-input{position:relative;}
  .auth-input svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;fill:none;stroke:#A2A8B2;stroke-width:2;pointer-events:none;}
  .auth-input input{margin:0;background:#F3F5F9;border:0;border-radius:14px;padding:14px 14px 14px 44px;height:52px;}
  .auth-signin{height:54px;border-radius:17px;font-size:16px;}
  .auth-link{display:block;margin:18px auto 0;border:0;background:none;color:var(--primary);font:700 13px inherit;cursor:pointer;}
  .invite-link{color:var(--slate);font-weight:600;margin-top:26px;}
  .toast{
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff;
    padding:11px 18px; border-radius:12px; font-size:13px; font-weight:600; z-index:150; opacity:0; transition:opacity .2s;
    max-width:90%; text-align:center;
  }
  .toast.show{opacity:1;}
  .divider{border:none; border-top:1px solid var(--line); margin:12px 0;}
  .flex-gap{display:flex; gap:8px;}
  .flex-gap > *{flex:1;}
  .modal-overlay{
    position:fixed; inset:0; background:rgba(22,24,28,.52); backdrop-filter:blur(4px); display:flex; align-items:center;
    justify-content:center; z-index:200; padding:20px;
  }
  .modal-card{
    background:#fff; border-radius:22px; padding:22px; max-width:360px; width:100%;
    max-height:80vh; overflow-y:auto; box-shadow:0 20px 60px rgba(20,24,40,.20);
  }
  .modal-card h3{margin:0 0 6px; font-size:17px; font-weight:800; color:var(--ink);}
  @media (max-width:519px){
    #app,.tabbar{max-width:none;}
    .fab{right:18px;}
  }
  @media (min-width:520px){
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background:#E5E7EB;}
    #app{
      position:relative;width:390px;height:min(844px,calc(100vh - 32px));min-height:0;margin:0;
      padding-top:46px;border-radius:48px;overflow:hidden;border:2px solid #BFC3CA;

<body>
<div id="app"><div class="empty">Loading store ops...</div></div>

<script>
const KEYS = { roster:'roster', catalog:'catalog', orders:'orders', payouts:'payouts', schedule:'schedule', announcements:'announcements', loginSecurity:'loginSecurity', requests:'requests', inviteCodes:'inviteCodes', timeEntries:'timeEntries', salaries:'salaries' };
const APP_ROLE = ['Owner','Manager','Employee'].includes(new URLSearchParams(location.search).get('appRole')) ? new URLSearchParams(location.search).get('appRole') : 'Owner';
const STORAGE_PREFIX = `metro_${APP_ROLE.toLowerCase()}_`;
function defaultLogin(){
  if(APP_ROLE==='Manager') return {name:'Store Manager',email:'manager@metrostore.com',phone:'555-0200',password:'Manager123',role:'Manager',employeeId:'MGR-100',area:'Central Area',store:'Metro Downtown',hourlyRate:28};
  if(APP_ROLE==='Employee') return {name:'Store Employee',email:'employee@metrostore.com',phone:'555-0300',password:'Employee123',role:'Employee',employeeId:'EMP-100',area:'Central Area',store:'Metro Downtown',hourlyRate:18};
  return {name:'Metro Owner',email:'owner@metrostore.com',phone:'555-0100',password:'Metro123',role:'Owner',employeeId:'OWNER-1',area:'Central Area',store:'Metro Downtown'};
}
let state = { user:null, tab:'home', data:{}, cart:{}, loaded:false, permEditFor:null, authView:'login', modal:null, announcementComposer:false, shiftComposer:false, requestComposer:false, catalogComposer:false, payoutComposer:false, teamComposer:false, salaryDetailId:null, teamDetailName:null, teamMenuFor:null, catalogAreaFilter:'All areas', catalogStoreFilter:'All stores', payoutAreaFilter:'All areas', payoutStoreFilter:'All stores', requestAreaFilter:'All areas', requestStoreFilter:'All stores', scheduleAreaFilter:'Central Area', scheduleStoreFilter:'Metro Downtown', scheduleDayFilter:null, teamAreaFilter:'All areas', teamStoreFilter:'All stores', salariesAreaFilter:'All areas', salariesStoreFilter:'All stores', salariesStatusFilter:'all' };
const PERMISSION_DEFS = [
  {key:'canApproveOrders', label:'Approve accessory orders'},
  {key:'canManageCatalog', label:'Manage the accessory catalog'},
  {key:'canPublishSchedule', label:'Publish and edit the schedule'},
  {key:'canManageMaintenance', label:'Review requirement and maintenance requests'},
  {key:'canPostAnnouncements', label:'Post announcements'},
  {key:'canEditRoster', label:"Edit employee names and roles"},
  {key:'canInviteEmployees', label:'Generate employee invite codes'}
];
function defaultPermissions(){
  const p = {}; PERMISSION_DEFS.forEach(d=>p[d.key]=true); return p;
}
function genInviteCode(existing){
  let code;
  do{ code = Math.random().toString(36).slice(2,8).toUpperCase(); }
  while(existing.find(c=>c.code===code));
  return code;
}

async function sget(key, fallback){
  try{ const r = await window.storage.get(STORAGE_PREFIX+key, true); return r ? JSON.parse(r.value) : fallback; }
  catch(e){ return fallback; }
}
async function sset(key, value){
  try{ await window.storage.set(STORAGE_PREFIX+key, JSON.stringify(value), true); }catch(e){ console.error('storage set failed', e); }
}
async function personalGet(key, fallback){
  try{ const r = await window.storage.get(STORAGE_PREFIX+key, false); return r ? JSON.parse(r.value) : fallback; }
  catch(e){ return fallback; }
}
async function personalSet(key, value){
  try{ await window.storage.set(STORAGE_PREFIX+key, JSON.stringify(value), false); }catch(e){}
}
async function resetAllData(){
  await sset(KEYS.roster, []);
  await sset(KEYS.orders, []);
  await sset(KEYS.payouts, []);
  await sset(KEYS.schedule, []);
  await sset(KEYS.announcements, []);
  await sset(KEYS.loginSecurity, {});
  await sset(KEYS.requests, []);
  await sset(KEYS.inviteCodes, []);
  await sset(KEYS.timeEntries, []);
  await sset(KEYS.salaries, []);
  await personalSet('lastUser', null);
}

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function money(n){ return '$' + (Math.round(n*100)/100).toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2}); }
async function hashPassword(pw){
  const enc = new TextEncoder().encode(pw);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
const LOCKOUT_MAX_ATTEMPTS = 5;
const LOCKOUT_MS = 5*60*1000;
function showToast(msg){
  let t = document.getElementById('toast');
  if(!t){ t = document.createElement('div'); t.id='toast'; t.className='toast'; document.body.appendChild(t); }
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.remove('show'), 4000);
}

async function loadAll(){
  state.data.roster = await sget(KEYS.roster, []);
  if(!state.data.roster.find(r=>r.role==='Owner')){
    state.data.roster.push({
      name:'Metro Owner', email:'owner@metrostore.com', phone:'555-0100',
      password:await hashPassword('Metro123'), role:'Owner', employeeId:'OWNER-1',
      area:'Central Area', store:'Metro Downtown',
      securityQuestion:'What city were you born in?',
      securityAnswerHash:await hashPassword('metro')
    });
    await sset(KEYS.roster,state.data.roster);
  }
  const login=defaultLogin();
  if(!state.data.roster.find(r=>r.email===login.email)){
    const entry={...login,password:await hashPassword(login.password)};
    if(login.role==='Manager') entry.permissions=defaultPermissions();
    state.data.roster.push(entry);
    await sset(KEYS.roster,state.data.roster);
  }
  if(APP_ROLE==='Owner'||APP_ROLE==='Manager'){
    const samplePassword=await hashPassword('Employee123');
    const sampleMembers=[
      {name:'Jordan Smith',email:'jordan@metrostore.com',phone:'555-014-1042',employeeId:'EMP-1042',role:'Employee',area:'Central Area',store:'Metro Downtown',hourlyRate:18},
      {name:'Taylor Reed',email:'taylor@metrostore.com',phone:'555-014-1068',employeeId:'EMP-1068',role:'Employee',area:'Central Area',store:'Metro Midtown',hourlyRate:20},
      {name:'Alex Morgan',email:'alex@metrostore.com',phone:'555-014-1104',employeeId:'EMP-1104',role:'Employee',area:'North Area',store:'Metro North',hourlyRate:18},
      {name:'Sam Wilson',email:'sam@metrostore.com',phone:'555-014-1121',employeeId:'EMP-1121',role:'Manager',area:'East Area',store:'Metro East',hourlyRate:19,permissions:defaultPermissions()}
    ];
    let rosterChanged=false;
    sampleMembers.filter(member=>APP_ROLE==='Owner'||member.area===defaultLogin().area).forEach(member=>{if(!state.data.roster.find(r=>r.email===member.email)){state.data.roster.push({...member,password:samplePassword});rosterChanged=true;}});
    if(rosterChanged) await sset(KEYS.roster,state.data.roster);
  }
  state.data.catalog = await sget(KEYS.catalog, [
    {id:uid(), name:'Phone case - clear', price:12.99, category:'Cases'},
    {id:uid(), name:'Tempered glass screen protector', price:9.99, category:'Screen protection'},
    {id:uid(), name:'20W USB-C wall charger', price:14.99, category:'Chargers'},
    {id:uid(), name:'6ft USB-C cable', price:7.99, category:'Cables'},
    {id:uid(), name:'Wireless earbuds', price:24.99, category:'Audio'}
  ]);
  state.data.orders = await sget(KEYS.orders, []);
  state.data.payouts = await sget(KEYS.payouts, []);
  state.data.schedule = await sget(KEYS.schedule, []);
  let scheduleSeeded=false;
  currentWeekDates().forEach((sampleDay,dayIndex)=>{
    if(state.data.schedule.some(s=>s.day===sampleDay&&s.area==='Central Area'&&s.store==='Metro Downtown')) return;
    const employeeName=APP_ROLE==='Employee'?'Store Employee':['Jordan Smith','Taylor Reed','Alex Morgan'][dayIndex%3];
    state.data.schedule.push(
      {id:uid(),employee:employeeName,area:'Central Area',store:'Metro Downtown',day:sampleDay,start:'09:00',end:'11:00',demo:true},
      {id:uid(),employee:APP_ROLE==='Employee'?'Store Employee':'Taylor Reed',area:'Central Area',store:'Metro Downtown',day:sampleDay,start:'11:30',end:'13:30',demo:true},
      {id:uid(),employee:APP_ROLE==='Employee'?'Store Employee':'Alex Morgan',area:'Central Area',store:'Metro Downtown',day:sampleDay,start:'14:00',end:'17:00',demo:true}
    );
    scheduleSeeded=true;
  });
  if(scheduleSeeded){
    await sset(KEYS.schedule,state.data.schedule);
  }
  state.data.announcements = await sget(KEYS.announcements, []);
  state.data.loginSecurity = await sget(KEYS.loginSecurity, {});
  state.data.requests = await sget(KEYS.requests, []);
  state.data.inviteCodes = await sget(KEYS.inviteCodes, []);
  state.data.timeEntries = await sget(KEYS.timeEntries, []);
  state.data.salaries = await sget(KEYS.salaries, []);
  if(APP_ROLE==='Owner'&&!state.data.salaries.length){
    state.data.salaries=[
      {id:uid(),employee:'Jordan Smith',area:'Central Area',store:'Metro Downtown',period:'Jun 29 – Jul 12',hours:78,rate:18,amount:1404,status:'pending'},
      {id:uid(),employee:'Taylor Reed',area:'Central Area',store:'Metro Midtown',period:'Jun 29 – Jul 12',hours:80,rate:20,amount:1600,status:'paid',paidDate:todayStr()},
      {id:uid(),employee:'Alex Morgan',area:'North Area',store:'Metro North',period:'Jun 29 – Jul 12',hours:74.5,rate:18,amount:1341,status:'pending'},
      {id:uid(),employee:'Sam Wilson',area:'East Area',store:'Metro East',period:'Jun 29 – Jul 12',hours:82,rate:19,amount:1558,status:'paid',paidDate:todayStr()}
    ];
    await sset(KEYS.salaries,state.data.salaries);
  }
  state.loaded = true;
}

function isAdmin(){ return state.user && (state.user.role === 'Owner' || state.user.role === 'Manager'); }
function isOwner(){ return state.user && state.user.role === 'Owner'; }
function getMyRosterEntry(){
  if(!state.user) return null;
  return (state.data.roster||[]).find(r=> state.user.phone ? r.phone===state.user.phone : r.name===state.user.name);
}
function hasPermission(key){
  if(isOwner()) return true;
  if(!state.user || state.user.role !== 'Manager') return false;
  const entry = getMyRosterEntry();
  if(!entry || !entry.permissions) return true;
  return entry.permissions[key] !== false;
}

function roleScope(){
  const entry=getMyRosterEntry()||defaultLogin();
  return {area:entry.area||'Central Area',store:entry.store||'Metro Downtown'};
}
function syncRoleLocationFilters(){
  if(APP_ROLE==='Owner') return;
  const scope=roleScope();
  ['catalog','payout','request','schedule','team'].forEach(prefix=>{
    state[`${prefix}AreaFilter`]=scope.area;
    if(APP_ROLE==='Employee') state[`${prefix}StoreFilter`]=scope.store;
    else if(!storesForArea(scope.area).includes(state[`${prefix}StoreFilter`])||state[`${prefix}StoreFilter`]==='All stores') state[`${prefix}StoreFilter`]=scope.store;
  });
}
function locationFilterCard(prefix,areaValue,storeValue,strict=false){
  if(APP_ROLE==='Employee') return '';
  if(APP_ROLE==='Manager') return `<div class="filter-card"><div class="field"><label>Store</label><select id="${prefix}StoreFilter">${locationOptions(storesForArea(roleScope().area),storeValue)}</select></div></div>`;
  const areas=strict?areaNames():['All areas',...areaNames()];
  const stores=strict?storesForArea(areaValue):['All stores',...storeNamesForFilter(areaValue)];
  return `<div class="filter-card"><div class="flex-gap"><div class="field"><label>Area</label><select id="${prefix}AreaFilter">${locationOptions(areas,areaValue)}</select></div><div class="field"><label>Store</label><select id="${prefix}StoreFilter">${locationOptions(stores,storeValue)}</select></div></div></div>`;
}
function locationEntryFields(areaId,storeId,area='Central Area',store='Metro Downtown'){
  const scope=roleScope();
  if(APP_ROLE==='Employee') return `<input type="hidden" id="${areaId}" value="${scope.area}"><input type="hidden" id="${storeId}" value="${scope.store}">`;
  if(APP_ROLE==='Manager') return `<input type="hidden" id="${areaId}" value="${scope.area}"><div class="field"><label>Store</label><select id="${storeId}">${locationOptions(storesForArea(scope.area),scope.store)}</select></div>`;
  return `<div class="field"><label>Area</label><select id="${areaId}">${locationOptions(areaNames(),area)}</select></div><div class="field"><label>Store</label><select id="${storeId}">${locationOptions(storesForArea(area),store)}</select></div>`;
}
function requestAssignmentFields(){
  const scope=roleScope();
  if(APP_ROLE==='Employee') return `<input type="hidden" name="reqAssignment" value="Store" checked><input type="hidden" id="reqStore" value="${scope.store}"><input type="hidden" id="reqArea" value="${scope.area}">`;
  if(APP_ROLE==='Manager') return `<input type="hidden" name="reqAssignment" value="Store" checked><input type="hidden" id="reqArea" value="${scope.area}"><div class="field"><label>Assign to store</label><select id="reqStore">${locationOptions(storesForArea(scope.area),scope.store)}</select></div>`;
  return `<div class="field"><label>Assign request</label><div class="segment"><label><input type="radio" name="reqAssignment" value="Store" checked><span>By store</span></label><label><input type="radio" name="reqAssignment" value="Area"><span>By area</span></label></div></div><div class="field" id="requestStoreField"><label>Choose store</label><select id="reqStore"><option>Metro Downtown</option><option>Metro North</option><option>Metro East</option><option>Metro West</option></select></div><div class="field" id="requestAreaField" style="display:none;"><label>Choose area</label><select id="reqArea">${locationOptions(areaNames(),'Central Area')}</select></div>`;
}

async function init(){
  const lastUser = await personalGet('lastUser', null);
  await loadAll();
  if(lastUser) state.user = lastUser;
  render();
}

function render(){
  const app = document.getElementById('app');
  if(!state.loaded){ app.innerHTML = '<div class="empty">Loading store ops...</div>'; return; }
  if(!state.user){ app.innerHTML = loginScreen() + renderModal(); attachLoginHandlers(); attachModalHandlers(); return; }
  syncRoleLocationFilters();
  app.innerHTML = `
    ${state.tab==='home'?`
    <div class="header">
      <div class="header-row">
        <div class="brand-lockup">
          <div class="brand-mark">${uiIcon('store')}</div>
          <div>
            <div class="brand">Metro Store Ops</div>
            <div class="brand-sub">${state.user.role} workspace</div>
          </div>
        </div>
        <div class="account-area">
          <button class="bell-btn" aria-label="Updates">${uiIcon('bell')}</button>
          <button class="avatar" id="accountBtn" title="${escapeHtml(state.user.name)}" aria-label="Open account menu">${initials(state.user.name)}</button>
        </div>
        <div class="role-chip">${escapeHtml(state.user.name)} · ${state.user.role}<button id="logoutBtn">Switch</button></div>
      </div>
    </div>
    `:''}
    <div class="content" id="content"></div>
    <div class="tabbar">
      ${tabButton('home','Home')}
      ${tabButton('schedule','Schedule')}
      ${!isOwner() ? tabButton('time','Time') : ''}
      ${isAdmin() ? tabButton('team','Team') : ''}
      ${isOwner() ? tabButton('salaries','Salaries') : ''}
      ${tabButton('settings','Settings')}
    </div>
    ${renderModal()}
  `;
  const logoutBtn=document.getElementById('logoutBtn');
  if(logoutBtn) logoutBtn.onclick = ()=>{ state.user = null; personalSet('lastUser', null); render(); };
  const accountBtn=document.getElementById('accountBtn');
  if(accountBtn) accountBtn.onclick = ()=>{
    const menu=document.querySelector('.role-chip');
    menu.style.display=menu.style.display==='flex'?'none':'flex';
  };
  document.querySelectorAll('.tab').forEach(el=>{
    el.onclick = ()=>{ state.tab = el.dataset.tab; render(); };
  });
  const content = document.getElementById('content');
  if(state.tab==='home') content.innerHTML = homeTab();
  else if(state.tab==='catalog') content.innerHTML = pageIntro('Catalog','Order and manage store accessories') + catalogTab();
  else if(state.tab==='payouts') content.innerHTML = pageIntro('Payouts','Track pay, commissions and bonuses') + payoutsTab();
  else if(state.tab==='schedule') content.innerHTML = pageIntro('Schedule','Plan and review team shifts') + scheduleTab();
  else if(state.tab==='requests') content.innerHTML = pageIntro('Requests','Submit and resolve store needs') + requestsTab();
  else if(state.tab==='team') content.innerHTML = pageIntro('Team','People, roles and access') + teamTab();
  else if(state.tab==='announcements') content.innerHTML = pageIntro('Announcements','Updates shared with stores and areas') + announcementsTab();
  else if(state.tab==='settings') content.innerHTML = pageIntro('Settings','Account and security preferences') + settingsTab();
  else if(state.tab==='time') content.innerHTML = pageIntro('Time & Pay','Clock in and review your biweekly pay') + timeTab();
  else if(state.tab==='salaries') content.innerHTML = pageIntro('Employee Salaries','Biweekly payroll status by location') + salariesTab();
  document.querySelectorAll('[data-quick]').forEach(el=>{ el.onclick=()=>{state.tab=el.dataset.quick;render();}; });
  attachTabHandlers();
  attachModalHandlers();
}

function tabButton(key, label){
  return `<button class="tab ${state.tab===key?'active':''}" data-tab="${key}">
    <span class="tab-icon">${uiIcon(key)}</span><span class="tab-label">${label}</span>
  </button>`;
}

function loginScreen(){
  const roster = state.data.roster || [];
  const noOwnerYet = !roster.find(r=>r.role==='Owner');
  if(noOwnerYet){
    return `

            <option value="What was your childhood best friend's name?">What was your childhood best friend's name?</option>
            <option value="What was the make of your first car?">What was the make of your first car?</option>
            <option value="custom">Write my own question</option>
          </select>
        </div>
        <div class="field" id="customQuestionWrap" style="display:none;">
          <label>Your custom question</label>
          <input id="setupCustomQuestion" placeholder="Enter your own question">
        </div>

function attachLoginHandlers(){
  const setupBtn = document.getElementById('setupOwnerBtn');
  if(setupBtn){
    const qSelect = document.getElementById('setupSecurityQuestion');
    const customWrap = document.getElementById('customQuestionWrap');
    if(qSelect) qSelect.onchange = ()=>{ customWrap.style.display = qSelect.value==='custom' ? 'block' : 'none'; };
    setupBtn.onclick = async ()=>{
      try{
        const name = document.getElementById('setupName').value.trim();
        const email = document.getElementById('setupEmail').value.trim();
        const phone = document.getElementById('setupPhone').value.trim();
        const rawPassword = document.getElementById('setupPassword').value;
        const qChoice = document.getElementById('setupSecurityQuestion').value;
        const customQ = document.getElementById('setupCustomQuestion').value.trim();
        const rawAnswer = document.getElementById('setupSecurityAnswer').value.trim();
        const question = qChoice==='custom' ? customQ : qChoice;
        if(!name || !email || !phone || !rawPassword || !question || !rawAnswer){ showToast('Fill out all fields, including the security question'); return; }
        if(!/^\S+@\S+\.\S+$/.test(email)){ showToast('Enter a valid email address'); return; }
        if(rawPassword.length < 6){ showToast('Password should be at least 6 characters'); return; }
        const password = await hashPassword(rawPassword);
        const securityAnswerHash = await hashPassword(rawAnswer.toLowerCase());
        const entry = {name, email, phone, password, role:'Owner', employeeId:'OWNER-1', securityQuestion:question, securityAnswerHash};
        state.data.roster.push(entry);
        const saveResult = await sset(KEYS.roster, state.data.roster);
        state.user = { name, role:'Owner', phone };
        await personalSet('lastUser', state.user);
        showToast('Owner account created');
        render();
      } catch(err){
        console.error('Owner setup failed:', err);
        showToast('Error: ' + err.message);
      }
    };
    return;
  }

  const showSignup = document.getElementById('showSignupBtn');
  if(showSignup) showSignup.onclick = ()=>{ state.authView = 'signup'; render(); };
  const showRecover = document.getElementById('showRecoverBtn');
  if(showRecover) showRecover.onclick = ()=>{ state.authView = 'recoverPhone'; render(); };
  const backToLogin = document.getElementById('backToLoginBtn');
  if(backToLogin) backToLogin.onclick = ()=>{ state.authView = 'login'; state.recoverPhone=null; state.recoverQuestion=null; render(); };

  const resetAllBtn = document.getElementById('resetAllBtn');
  if(resetAllBtn) resetAllBtn.onclick = ()=>{
    state.modal = {
      kind:'confirm',
      title:'Reset all app data?',
      message:'This will permanently erase all accounts, orders, payouts, schedule, and announcements for everyone. This cannot be undone.',
      confirmLabel:'Reset everything',
      danger:true,
      action:'resetAllData'
    };
    render();
  };

  const recoverFindBtn = document.getElementById('recoverFindBtn');
  if(recoverFindBtn) recoverFindBtn.onclick = ()=>{
    const phone = document.getElementById('recoverPhone').value.trim();
    const entry = state.data.roster.find(r=>r.phone===phone);
    if(!entry || !entry.securityQuestion){ showToast('No recovery option is set up for that phone number. Ask your owner for help.'); return; }
    state.recoverPhone = phone;
    state.recoverQuestion = entry.securityQuestion;
    state.authView = 'recoverAnswer';
    render();
  };

  const recoverResetBtn = document.getElementById('recoverResetBtn');
  if(recoverResetBtn) recoverResetBtn.onclick = async ()=>{
    const answer = document.getElementById('recoverAnswer').value.trim();
    const newPassword = document.getElementById('recoverNewPassword').value;
    const confirmPassword = document.getElementById('recoverConfirmPassword').value;
    if(!answer || !newPassword || !confirmPassword){ showToast('Fill out all fields'); return; }
    if(newPassword.length < 6){ showToast('Password should be at least 6 characters'); return; }
    if(newPassword !== confirmPassword){ showToast("Passwords don't match"); return; }
    const entry = state.data.roster.find(r=>r.phone===state.recoverPhone);
    if(!entry){ showToast('Something went wrong, start over'); state.authView='login'; render(); return; }
    const answerHash = await hashPassword(answer.toLowerCase());
    if(answerHash !== entry.securityAnswerHash){ showToast('That answer is incorrect'); return; }
    entry.password = await hashPassword(newPassword);
    await sset(KEYS.roster, state.data.roster);
    state.authView = 'login';
    state.recoverPhone = null;
    state.recoverQuestion = null;
    showToast('Password reset, sign in with your new password');
    render();
  };

  const signupBtn = document.getElementById('signupBtn');
  if(signupBtn){
    signupBtn.onclick = async ()=>{
      const code = document.getElementById('signupCode').value.trim().toUpperCase();
      const name = document.getElementById('signupName').value.trim();
      const phone = document.getElementById('signupPhone').value.trim();
      const rawPassword = document.getElementById('signupPassword').value;
      if(!code || !name || !phone || !rawPassword){ showToast('Fill out all fields'); return; }
      if(rawPassword.length < 6){ showToast('Password should be at least 6 characters'); return; }
      const invite = state.data.inviteCodes.find(c=>c.code===code && !c.used);
      if(!invite){ showToast('That invite code is invalid or already used'); return; }
      if(state.data.roster.find(r=>r.phone===phone)){ showToast('That phone number is already in use'); return; }
      const password = await hashPassword(rawPassword);
      const accountName=invite.name||name;
      state.data.roster.push({ name:accountName, phone, password, role:invite.role||'Employee', employeeId:invite.employeeId||null, email:invite.email||null, area:invite.area||'Central Area', store:invite.store||'Metro Downtown' });
      invite.used = true;
      invite.usedBy = name;
      await sset(KEYS.roster, state.data.roster);
      await sset(KEYS.inviteCodes, state.data.inviteCodes);
      state.user = { name:accountName, role:invite.role||'Employee', phone };
      await personalSet('lastUser', state.user);
      state.authView = 'login';
      showToast('Account created');
      render();
    };
    return;
  }

  document.getElementById('loginBtn').onclick = async ()=>{
    const phone = document.getElementById('loginPhone').value.trim();
    const rawPassword = document.getElementById('loginPassword').value;
    if(!phone || !rawPassword){ showToast('Enter email and password'); return; }
    const security = state.data.loginSecurity || {};
    const record = security[phone];
    const now = Date.now();
    if(record && record.lockedUntil && record.lockedUntil > now){
      const minsLeft = Math.ceil((record.lockedUntil - now)/60000);
      showToast(`Too many failed attempts. Try again in ${minsLeft} min.`);
      return;
    }
    const hashed = await hashPassword(rawPassword);
    const match = state.data.roster.find(r=>(r.email&&r.email.toLowerCase()===phone.toLowerCase()||r.phone===phone)&&r.password===hashed);
    if(!match){
      const attempts = (record && record.lockedUntil <= now ? 0 : (record ? record.attempts : 0)) + 1;
      security[phone] = { attempts, lockedUntil: attempts >= LOCKOUT_MAX_ATTEMPTS ? now + LOCKOUT_MS : 0 };
      state.data.loginSecurity = security;
      await sset(KEYS.loginSecurity, security);
      if(attempts >= LOCKOUT_MAX_ATTEMPTS){ showToast('Too many failed attempts. Locked for 5 minutes.'); }
      else { showToast('Email or password not recognized'); }
      return;
    }
    delete security[phone];
    state.data.loginSecurity = security;
    await sset(KEYS.loginSecurity, security);
    state.user = { name: match.name, role: match.role, phone: match.phone };
    await personalSet('lastUser', state.user);
    render();
  };
}

function salaryDetailSheet(id){

function formatElapsed(start){const mins=Math.floor((Date.now()-new Date(start))/60000);return `${String(Math.floor(mins/60)).padStart(2,'0')}:${String(mins%60).padStart(2,'0')}`;}
function distanceMetres(lat1,lng1,lat2,lng2){const R=6371e3,p1=lat1*Math.PI/180,p2=lat2*Math.PI/180,dp=(lat2-lat1)*Math.PI/180,dl=(lng2-lng1)*Math.PI/180,a=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

function startGeofenceWatch(){if(!activeTimeEntry()||geoWatchId!==null||!navigator.geolocation)return;const fence=assignedGeofence();geoWatchId=navigator.geolocation.watchPosition(pos=>{if(distanceMetres(pos.coords.latitude,pos.coords.longitude,fence.lat,fence.lng)>fence.radius)finishClockOut('left_geofence');},()=>{}, {enableHighAccuracy:true,maximumAge:15000,timeout:20000});}

function renderModal(){

    return `<div class="modal-overlay"><div class="modal-card">
      <h3>${escapeHtml(m.title)}</h3>
      <p class="muted">${escapeHtml(m.message)}</p>
      <div class="flex-gap" style="margin-top:14px;">
        <button class="btn secondary" id="modalCancelBtn">Cancel</button>
        <button class="btn ${m.danger?'danger':''}" id="modalConfirmBtn">${escapeHtml(m.confirmLabel||'Confirm')}</button>
      </div>
    </div></div>`;
  }
  if(m.kind==='prompt'){
    return `<div class="modal-overlay"><div class="modal-card">
      <h3>${escapeHtml(m.title)}</h3>
      ${m.message? `<p class="muted">${escapeHtml(m.message)}</p>`:''}
      ${m.fields.map(f=>`
        <div class="field">

          ${f.type==='select'
            ? `<select id="modalField_${f.id}">${f.options.map(o=>`<option value="${o}" ${o===f.value?'selected':''}>${o}</option>`).join('')}</select>`
            : `<input id="modalField_${f.id}" type="${f.type||'text'}" value="${escapeHtml(f.value||'')}" placeholder="${escapeHtml(f.placeholder||'')}">`}

  }

  const confirmBtn = document.getElementById('modalConfirmBtn');
  if(confirmBtn) confirmBtn.onclick = ()=>{ handleModalConfirm(); };

async function handleModalConfirm(){
  const m = state.modal;
  if(!m) return;
  try{
    if(m.action==='resetAllData'){
      await resetAllData();
      state.user = null;
      state.authView = 'login';
      await loadAll();
      state.modal = null;
      showToast('All data has been reset');
      render();
      return;
    }
    if(m.action==='resetPassword'){
      const val = document.getElementById('modalField_newpw').value;
      if(!val || val.length < 6){ showToast('Password should be at least 6 characters'); return; }
      const entry = state.data.roster.find(r=>r.name===m.context.name);
      if(entry){
        entry.password = await hashPassword(val);
        await sset(KEYS.roster, state.data.roster);
        showToast(`Password reset for ${entry.name}`);
      }
      state.modal = null;
      render();
      return;
    }
    if(m.action==='editId'){
      const val = document.getElementById('modalField_newid').value.trim();
      if(!val){ showToast('Employee ID cannot be empty'); return; }
      if(state.data.roster.find(r=>r.name!==m.context.name && r.employeeId && r.employeeId.toLowerCase()===val.toLowerCase())){
        showToast('That employee ID is already in use'); return;
      }
      const entry = state.data.roster.find(r=>r.name===m.context.name);
      if(entry){
        entry.employeeId = val;
        await sset(KEYS.roster, state.data.roster);
        showToast('Employee ID updated');
      }
      state.modal = null;
      render();
      return;
    }
    if(m.action==='editRoster'){
      const nameVal = document.getElementById('modalField_name').value.trim();
      const roleField = document.getElementById('modalField_role');
      const areaField = document.getElementById('modalField_area');
      const storeField = document.getElementById('modalField_store');
      if(!nameVal){ showToast('Name cannot be empty'); return; }
      const entry = state.data.roster.find(r=>r.name===m.context.name);
      if(entry){
        entry.name = nameVal;
        if(entry.role!=='Owner' && roleField){
          const roleVal = roleField.value;
          entry.role = roleVal;
          if(roleVal==='Manager' && !entry.permissions) entry.permissions = defaultPermissions();
        }
        if(areaField) entry.area=areaField.value;
        if(storeField) entry.store=storeField.value;
        await sset(KEYS.roster, state.data.roster);
        showToast('Roster entry updated');
      }
      state.modal = null;
      render();
      return;
    }
  } catch(err){
    console.error('Modal action failed:', err);
    showToast('Error: ' + err.message);
  }
}

    if(!name||!email||!phone||!employeeId){showToast('Fill out name, email, phone, and employee ID');return;}
    if(!/^\S+@\S+\.\S+$/.test(email)){showToast('Enter a valid email address');return;}
    if(state.data.roster.find(r=>r.email&&r.email.toLowerCase()===email.toLowerCase())||state.data.inviteCodes.find(c=>!c.used&&c.email&&c.email.toLowerCase()===email.toLowerCase())){showToast('That email is already in use or invited');return;}
    if(state.data.roster.find(r=>r.employeeId&&r.employeeId.toLowerCase()===employeeId.toLowerCase())){showToast('That employee ID is already in use');return;}
    const code=genInviteCode(state.data.inviteCodes);
    state.data.inviteCodes.push({code,name,email,phone,employeeId,role,area,store,createdBy:state.user.name,used:false});
    await sset(KEYS.inviteCodes,state.data.inviteCodes);
    state.teamComposer=false;
    showToast(`Invite sent to ${email} · code ${code}`);
    render();
  };

  document.querySelectorAll('[data-revokecode]').forEach(b=>b.onclick=async ()=>{
    state.data.inviteCodes = state.data.inviteCodes.filter(c=>c.code!==b.dataset.revokecode);
    await sset(KEYS.inviteCodes, state.data.inviteCodes);
    showToast('Code revoked');
    render();
  });

  const addTeam = document.getElementById('addTeamBtn');
  if(addTeam) addTeam.onclick = async ()=>{
    if(!isOwner()){ return; }
    const name = document.getElementById('teamName').value.trim();
    const employeeId = document.getElementById('teamEmployeeId').value.trim();
    const phone = document.getElementById('teamPhone').value.trim();
    const rawPassword = document.getElementById('teamPassword').value;
    const role = document.getElementById('teamRole').value;
    if(!name || !employeeId || !phone || !rawPassword){ showToast('Fill out name, employee ID, phone, and password'); return; }
    if(rawPassword.length < 6){ showToast('Password should be at least 6 characters'); return; }
    if(state.data.roster.find(r=>r.name.toLowerCase()===name.toLowerCase())){ showToast('Already on roster'); return; }
    if(state.data.roster.find(r=>r.phone===phone)){ showToast('That phone number is already in use'); return; }
    if(state.data.roster.find(r=>r.employeeId && r.employeeId.toLowerCase()===employeeId.toLowerCase())){ showToast('That employee ID is already in use'); return; }
    const password = await hashPassword(rawPassword);
    const entry = {name, employeeId, phone, password, role};
    if(role==='Manager') entry.permissions = defaultPermissions();
    state.data.roster.push(entry);
    await sset(KEYS.roster, state.data.roster);
    showToast('Added to roster');
    render();
  };

  const submitReq = document.getElementById('submitReqBtn');
  if(submitReq) submitReq.onclick = async ()=>{
    const type = document.getElementById('reqType').value;
    const details = document.getElementById('reqDetails').value.trim();
    if(!details){ showToast('Describe what you need'); return; }
    const assignmentType=(document.querySelector('input[name="reqAssignment"]:checked,input[name="reqAssignment"][type="hidden"]')||{}).value||'Store';
    const assignmentValue=assignmentType==='Store'?document.getElementById('reqStore').value:document.getElementById('reqArea').value;
    state.data.requests.push({id:uid(), employee:state.user.name, type, details, assignmentType, assignmentValue, status:'pending', date:todayStr()});
    await sset(KEYS.requests, state.data.requests);
    state.requestComposer=false;
    showToast('Request submitted');
    render();
  };

  document.querySelectorAll('[data-resolvereq]').forEach(b=>b.onclick=async ()=>{
    const r = state.data.requests.find(x=>x.id===b.dataset.resolvereq);
    if(r){ r.status='resolved'; await sset(KEYS.requests, state.data.requests); render(); }
  });

  document.querySelectorAll('[data-editroster]').forEach(b=>b.onclick=()=>{
    const entry = state.data.roster.find(r=>r.name===b.dataset.editroster);
    if(!entry) return;
    if(entry.role==='Owner' && !isOwner()){ showToast('Only the owner can edit the owner account'); return; }
    const fields = [{id:'name', label:'Employee name', type:'text', value:entry.name}];
    if(entry.role!=='Owner'){
      fields.push({id:'role', label:'Role', type:'select', options:['Employee','Manager'], value:entry.role});
    }
    if(isOwner()) fields.push({id:'area',label:'Area',type:'select',options:areaNames(),value:entry.area||'Central Area'});
    fields.push({id:'store',label:'Store',type:'select',options:isOwner()?storeNamesForFilter('All areas'):storesForArea(roleScope().area),value:entry.store||roleScope().store});
    state.teamDetailName=null;
    state.teamMenuFor=null;
    state.modal = { kind:'prompt', title:'Edit team member', fields, confirmLabel:'Save', action:'editRoster', context:{name:entry.name} };
    render();
  });

  document.querySelectorAll('[data-editid]').forEach(b=>b.onclick=()=>{
    const entry = state.data.roster.find(r=>r.name===b.dataset.editid);
    if(!entry) return;
    state.modal = {
      kind:'prompt', title:'Edit employee ID',
      fields:[{id:'newid', label:'Employee ID', type:'text', value:entry.employeeId||''}],
      confirmLabel:'Save', action:'editId', context:{name:entry.name}
    };
    render();
  });

  document.querySelectorAll('[data-permfor]').forEach(b=>b.onclick=()=>{
    state.permEditFor = state.permEditFor===b.dataset.permfor ? null : b.dataset.permfor;
    render();
  });

  document.querySelectorAll('[data-savepermfor]').forEach(b=>b.onclick=async ()=>{
    const entry = state.data.roster.find(r=>r.name===b.dataset.savepermfor);
    if(!entry) return;
    const perms = {};
    PERMISSION_DEFS.forEach(d=>{
      const cb = document.querySelector(`[data-permkey="${d.key}"]`);
      perms[d.key] = cb ? cb.checked : true;
    });
    entry.permissions = perms;
    await sset(KEYS.roster, state.data.roster);
    state.permEditFor = null;
    showToast('Access updated');
    render();
  });

  document.querySelectorAll('[data-resetpw]').forEach(b=>b.onclick=()=>{
    state.modal = {
      kind:'prompt', title:`Reset password for ${b.dataset.resetpw}`,
      fields:[{id:'newpw', label:'New password', type:'password', placeholder:'At least 6 characters'}],
      confirmLabel:'Reset password', action:'resetPassword', context:{name:b.dataset.resetpw}
    };
    render();
  });

  document.querySelectorAll('[data-removeteam]').forEach(b=>b.onclick=async ()=>{
    const target=state.data.roster.find(r=>r.name===b.dataset.removeteam);
    if(!target||target.role==='Owner'){showToast('The owner account cannot be removed');return;}
    state.data.roster = state.data.roster.filter(r=>r.name!==b.dataset.removeteam);
    await sset(KEYS.roster, state.data.roster);
    render();
  });
}

init();
</script>
</body>
</html>
